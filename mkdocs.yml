site_name: FastPKI Documentation
site_description: API-based PKI management system — an easier alternative to Easy-RSA
site_url: https://jsenecal.github.io/fastpki/
repo_url: https://github.com/jsenecal/fastpki
repo_name: jsenecal/fastpki

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - First Steps: getting-started/first-steps.md
  - Guides:
      - Certificate Authorities: guides/certificate-authorities.md
      - Certificates: guides/certificates.md
      - Exporting: guides/exporting.md
      - Organizations: guides/organizations.md
      - Users: guides/users.md
      - Audit Logs: guides/audit-logs.md
  - Security:
      - Authentication: security/authentication.md
      - Authorization: security/authorization.md
      - Encryption at Rest: security/encryption.md
  - Reference:
      - API Endpoints: reference/api.md
      - Configuration: reference/configuration.md
      - Models: reference/models.md
  - Deployment:
      - Docker: deployment/docker.md
      - Production: deployment/production.md
  - Development:
      - Contributing: development/contributing.md
      - Versioning: development/versioning.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
