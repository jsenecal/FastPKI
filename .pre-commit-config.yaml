repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: no-ai-attribution
        name: Block AI/Claude attributions in commit messages
        entry: sh -c '! grep -iE "(claude|anthropic|co-authored-by.*claude|co-authored-by.*anthropic|generated.*ai|generated.*claude)" "$1"'
        language: system
        stages: [commit-msg]
